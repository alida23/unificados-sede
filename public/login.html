<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Unificados Sede</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-wrapper"> 
        <div class="login-box" id="mainLoginBox">
            <div class="logo">
                <h2>UNIFICADOS <span>SEDE</span></h2>
                <p>Mamá Emprendedora Guatemala</p>
            </div>
     
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ej: User1" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <span id="togglePassword" class="toggle-icon">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-login">Entrar al Sistema</button>
            </form>
            
            <div id="error-message" style="color: #ff4d4d; margin-top: 15px; font-size: 14px; display: none; text-align: center;"></div>

            <div class="footer-links">
                <a href="https://wa.me/50233807622?text=Hola%20Alida,%20olvidé%20mi%20clave%20de%20unificados%20en%20sede" target="_blank">
                    ¿Olvidaste tu contraseña? Escríbenos por WhatsApp
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    
  <script src="auth.js"></script>
    <script src="script.js"></script>
    
    <script>
        window.onload = () => {
            verificarAcceso('login');
        };

        // Lógica del ojito (puedes dejar la que ya tenías aquí abajo)
        const togglePassword = document.querySelector('#togglePassword');
        const passwordField = document.querySelector('#password');
        togglePassword.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🔒';
        });
    </script>
   
</body>
</html>
