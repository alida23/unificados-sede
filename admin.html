<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administradora</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
</head>
<body>

<div class="admin-layout">
    <!-- COLUMNA IZQUIERDA: Menú y Estado --> 
    <nav class="sidebar">
        <div class="menu-section">
            <h3>👥 Usuarios</h3>
            <button onclick="detenerEscanner(); mostrarFormularioRegistro()">➕ Registrar Usuario</button>
            <button onclick="detenerEscanner(); listarUsuarios()">📋 Ver/Editar Usuarios</button>
        </div>
        
        <div class="menu-section">
            <h3>📦 Paquetes</h3>
            <button onclick="detenerEscanner(); mostrarFormularioPaquete()" class="menu-btn">📥 Registrar Paquete</button>
            <button onclick="detenerEscanner(); cargarChecklist()">✅ Check-List General</button>
            <button onclick="detenerEscanner(); cargarFaltantes()">⚠️ Ver Pendientes</button>
            <button onclick="generarPlanillaQR()" class="menu-btn">🖨️ Generar Etiquetas QR</button>
           <button onclick="abrirEscannerQR()" class="menu-btn">📸 Escanear QR</button>
        </div>

        <div class="menu-section">
            <h3>📊 Reportes</h3>
            <button onclick="detenerEscanner(); generarReporteSabado()">📅 Resumen Sábado</button>
        </div>

        <!-- MOVIMOS AQUÍ EL ESTADO DE SEDE Y BUSCADOR -->
        <div class="quick-controls-sidebar">
            <div class="control-card">
                <h3>Estado de Sede</h3>
                <div class="progress-container">
                    <p>Recepción: <span id="porcentaje-texto">0%</span></p>
                    <div class="progress-bar-bg">
                        <div id="progreso-llenado" class="progress-bar-fill"></div>
                    </div>
                </div>
            </div>

            <div class="control-card">
                <h3>Buscador Rápido</h3>
                <div class="search-box">
                    <input type="text" id="inputBusqueda" placeholder="🔍 Buscar..." onkeyup="buscadorGlobal()">
                </div>
                <button class="btn-archive" onclick="confirmarLimpieza()">📦 Archivar Sábado</button>
            </div>
        </div>

        <button onclick="logout()" class="btn-logout">🚪 Cerrar Sesión</button>
    </nav>

    <!-- COLUMNA DERECHA: Saludo y Contenido -->
    <main class="main-content">
        <header class="content-header">
            <h2 id="saludo-usuario">Bienvenida ✨</h2>
        </header>

        <section id="contenedor-dinamico" class="display-area">
            <p class="placeholder-text">Selecciona una opción del menú para gestionar la sede.</p>
        </section>
    </main>
    
</div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <script>
        // ESTO ES LO QUE DETIENE EL BUCLE
            window.onload = () => {
                if (verificarAcceso('admin')) {
                    const nombre = localStorage.getItem('nombreUsuario');
                    const saludo = document.getElementById('saludo-usuario');
                    if (saludo && nombre) {
                        saludo.innerText = `¡Bienvenida, ${nombre}! ✨`;
                    }
                }
            };
    </script>
</body>
</html>
